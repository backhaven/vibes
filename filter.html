<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bool or No Bool - Static Filter</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #111; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        }
        
        #camera-feed { 
            width: 100vw; 
            height: 100vh; 
            object-fit: cover; 
            position: absolute; 
            top: 0; left: 0; 
            z-index: 1; 
        }
        
        #ui-layer { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: 2; 
            display: flex; 
            flex-direction: column; 
            pointer-events: none; 
        }

        /* Setup & Tagging Screens */
        .screen {
            background: rgba(0, 0, 0, 0.85); 
            color: white; 
            padding: 30px 20px; 
            margin: 40px 20px; 
            border-radius: 15px; 
            pointer-events: auto; 
            text-align: center;
            display: none; 
            flex-direction: column;
            align-items: center;
        }
        
        #upload-screen { display: flex; }

        #tag-preview {
            max-width: 200px;
            max-height: 200px;
            border-radius: 10px;
            margin: 20px 0;
            border: 3px solid white;
        }

        /* STATIC FILTER IMAGE */
        #tracked-image { 
            position: absolute;
            display: none; 
            top: 10%; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 220px; 
            border: 5px solid white; 
            border-radius: 15px; 
            background: white; 
            box-shadow: 0px 10px 20px rgba(0,0,0,0.5);
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            z-index: 5;
        }

        #game-ui {
            display: none;
            position: absolute;
            bottom: 40px;
            width: 100%;
            justify-content: center;
            pointer-events: auto;
        }

        .button-row { display: flex; gap: 20px; justify-content: center; width: 100%; }
        button { 
            padding: 15px 30px; 
            font-size: 18px; 
            border: none; 
            border-radius: 30px; 
            cursor: pointer; 
            font-weight: 800; 
            text-transform: uppercase;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
        }
        .btn-bool { background: #00f2fe; color: black; }
        .btn-nobool { background: #ff0844; color: white; }
        .btn-neutral { background: white; color: black; margin-top: 15px; }
        
        input[type="file"] { margin: 15px 0; }

        /* --- ANIMATIONS & TEXT --- */
        #feedback-text {
            position: absolute;
            top: 45%;
            width: 100%;
            text-align: center;
            font-size: 50px;
            font-weight: 900;
            text-transform: uppercase;
            opacity: 0;
            text-shadow: 0px 5px 15px rgba(0,0,0,0.8);
            transition: opacity 0.2s;
            z-index: 10;
            pointer-events: none;
        }

        /* Added a dedicated class for the Game Over text */
        .game-over-text {
            color: #FFD700 !important; /* Gold */
            font-size: 60px !important;
            opacity: 1 !important;
            animation: popIn 0.5s ease-out forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .anim-correct {
            border-color: #00ff00 !important;
            box-shadow: 0 0 30px 10px rgba(0, 255, 0, 0.7) !important;
            transform: translateX(-50%) scale(1.1) !important; 
        }

        .anim-wrong {
            border-color: #ff0000 !important;
            box-shadow: 0 0 30px 10px rgba(255, 0, 0, 0.7) !important;
            animation: shake 0.4s;
        }

        @keyframes shake {
            0% { transform: translateX(-50%); }
            25% { transform: translateX(calc(-50% - 15px)) rotate(-5deg); }
            50% { transform: translateX(calc(-50% + 15px)) rotate(5deg); }
            75% { transform: translateX(calc(-50% - 15px)) rotate(-5deg); }
            100% { transform: translateX(-50%); }
        }
    </style>
</head>
<body>

    <video id="camera-feed" autoplay playsinline></video>
    <img id="tracked-image" src="" alt="Filter Image">
    <div id="feedback-text"></div>

    <div id="ui-layer">
        
        <div id="upload-screen" class="screen">
            <h2>Step 1: Upload</h2>
            <p>Select multiple images to use in the filter.</p>
            <input type="file" id="image-upload" multiple accept="image/*">
            <button id="btn-next" class="btn-neutral" style="display:none;">Next: Tag Images</button>
        </div>

        <div id="tag-screen" class="screen">
            <h2>Step 2: Set Answers</h2>
            <p>Is this image Bool or No Bool?</p>
            <img id="tag-preview" src="">
            <p id="tag-counter">Image 1 of X</p>
            <div class="button-row">
                <button class="btn-nobool" onclick="saveTag('nobool')">No Bool</button>
                <button class="btn-bool" onclick="saveTag('bool')">Bool</button>
            </div>
        </div>

        <div id="game-ui">
            <div class="button-row">
                <button class="btn-nobool" onclick="makeGuess('nobool')">No Bool</button>
                <button class="btn-bool" onclick="makeGuess('bool')">Bool</button>
            </div>
        </div>

    </div>

    <script>
        // Data State
        let uploadedFiles = []; 
        let gameData = [];      
        let remainingImages = []; // Tracks which images haven't been shown yet
        let currentTagIndex = 0;
        let currentGameItem = null;
        let isAnimating = false;

        // Elements
        const video = document.getElementById('camera-feed');
        const uploadScreen = document.getElementById('upload-screen');
        const tagScreen = document.getElementById('tag-screen');
        const gameUI = document.getElementById('game-ui');
        const imageUpload = document.getElementById('image-upload');
        const btnNext = document.getElementById('btn-next');
        const tagPreview = document.getElementById('tag-preview');
        const tagCounter = document.getElementById('tag-counter');
        const trackedImage = document.getElementById('tracked-image');
        const feedbackText = document.getElementById('feedback-text');

        // 1. Initialize Camera
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
            .then((stream) => { 
                video.srcObject = stream; 
            })
            .catch((err) => { 
                alert("Please allow camera access!"); 
            });

        // 2. Handle File Uploads
        imageUpload.addEventListener('change', (e) => {
            uploadedFiles = [];
            const files = Array.from(e.target.files);
            if (files.length > 0) btnNext.style.display = 'block';

            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (event) => uploadedFiles.push(event.target.result);
                reader.readAsDataURL(file);
            });
        });

        // 3. Move to Tagging Phase
        btnNext.addEventListener('click', () => {
            uploadScreen.style.display = 'none';
            tagScreen.style.display = 'flex';
            showTaggingImage();
        });

        function showTaggingImage() {
            tagPreview.src = uploadedFiles[currentTagIndex];
            tagCounter.innerText = `Image ${currentTagIndex + 1} of ${uploadedFiles.length}`;
        }

        // 4. Save Tag & Advance
        window.saveTag = function(answer) {
            gameData.push({
                src: uploadedFiles[currentTagIndex],
                answer: answer
            });

            currentTagIndex++;

            if (currentTagIndex < uploadedFiles.length) {
                showTaggingImage(); 
            } else {
                startFilter(); 
            }
        };

        // 5. Start the Game
        function startFilter() {
            tagScreen.style.display = 'none';
            gameUI.style.display = 'flex';
            trackedImage.style.display = 'block';

            // Clone the master list into our temporary pool
            remainingImages = [...gameData]; 
            
            cycleImage();
        }

        // 6. Game Logic & Validation
        function cycleImage() {
            // Check if we are out of images!
            if (remainingImages.length === 0) {
                triggerGameOver();
                return;
            }

            // Pick a random index from the REMAINING images
            const randomIndex = Math.floor(Math.random() * remainingImages.length);
            currentGameItem = remainingImages[randomIndex];
            trackedImage.src = currentGameItem.src;

            // Remove that image from the pool so it doesn't repeat
            remainingImages.splice(randomIndex, 1);
        }

        window.makeGuess = function(guess) {
            if (isAnimating) return; 
            isAnimating = true;

            const isCorrect = (guess === currentGameItem.answer);

            if (isCorrect) {
                trackedImage.classList.add('anim-correct');
                feedbackText.innerText = "CORRECT!";
                feedbackText.style.color = "#00ff00";
            } else {
                trackedImage.classList.add('anim-wrong');
                feedbackText.innerText = "WRONG!";
                feedbackText.style.color = "#ff0000";
            }

            feedbackText.style.opacity = 1;

            setTimeout(() => {
                trackedImage.classList.remove('anim-correct', 'anim-wrong');
                feedbackText.style.opacity = 0;
                cycleImage();
                isAnimating = false;
            }, 1500);
        };

        // 7. Game Over Sequence
        function triggerGameOver() {
            // Hide the game elements
            trackedImage.style.display = 'none';
            gameUI.style.display = 'none';

            // Show Game Over Text
            feedbackText.innerText = "GAME OVER!";
            feedbackText.className = "game-over-text";

            // Blast Confetti
            var duration = 3000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#00f2fe', '#ff0844', '#ffffff']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#00f2fe', '#ff0844', '#ffffff']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>
</body>
</html>
