<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bool or No Bool</title>
    <style>
        /* Reset and styling for a fullscreen app feel */
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        }
        
        /* Make the camera feed fill the screen */
        #camera-feed { 
            width: 100vw; 
            height: 100vh; 
            object-fit: cover; 
            position: absolute; 
            top: 0; left: 0; 
            z-index: 1; 
        }
        
        /* The UI layer sits on top of the camera */
        #ui-layer { 
            position: absolute; 
            top: 0; left: 0; 
            z-index: 2; 
            width: 100%; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            pointer-events: none; /* Lets you click through to the buttons */
        }

        /* Initial setup screen styling */
        #setup-screen { 
            background: rgba(0, 0, 0, 0.7); 
            color: white; 
            padding: 20px; 
            margin: 40px 20px; 
            border-radius: 15px; 
            pointer-events: auto; 
            text-align: center;
        }

        /* The active "filter" area styling */
        #filter-area { 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100%; 
            pointer-events: auto; 
        }

        /* The random image that pops up */
        #current-image { 
            max-width: 250px; 
            max-height: 250px; 
            border: 5px solid white; 
            border-radius: 15px; 
            margin-bottom: 40px; 
            background: white; 
            box-shadow: 0px 10px 20px rgba(0,0,0,0.5);
            /* Add a little animation for when the image changes */
            transition: transform 0.2s; 
        }

        /* Button styling */
        .button-row { display: flex; gap: 20px; }
        button { 
            padding: 15px 30px; 
            font-size: 20px; 
            border: none; 
            border-radius: 30px; 
            cursor: pointer; 
            font-weight: 800; 
            text-transform: uppercase;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
        }
        #btn-bool { background: #00f2fe; color: black; }
        #btn-nobool { background: #ff0844; color: white; }
        #start-btn { background: white; color: black; margin-top: 15px; }
        
        input[type="file"] { margin: 15px 0; }
    </style>
</head>
<body>

    <video id="camera-feed" autoplay playsinline></video>

    <div id="ui-layer">
        
        <div id="setup-screen">
            <h2>Setup Filter</h2>
            <p>Select the images you want to cycle through.</p>
            <input type="file" id="image-upload" multiple accept="image/*">
            <br>
            <button id="start-btn">Start Filter</button>
        </div>

        <div id="filter-area">
            <img id="current-image" src="" alt="Filter Image">
            <div class="button-row">
                <button id="btn-nobool">No Bool</button>
                <button id="btn-bool">Bool</button>
            </div>
        </div>

    </div>

    <script>
        // Grab elements from the HTML
        const video = document.getElementById('camera-feed');
        const imageUpload = document.getElementById('image-upload');
        const startBtn = document.getElementById('start-btn');
        const setupScreen = document.getElementById('setup-screen');
        const filterArea = document.getElementById('filter-area');
        const currentImage = document.getElementById('current-image');
        const btnBool = document.getElementById('btn-bool');
        const btnNobool = document.getElementById('btn-nobool');

        let uploadedImages = [];

        // 1. Request Camera Access (facingMode: "user" asks for the selfie cam)
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
            .then((stream) => {
                video.srcObject = stream;
            })
            .catch((err) => {
                console.error("Camera access denied or unavailable:", err);
                alert("Please allow camera access for this to work!");
            });

        // 2. Handle Image Uploads
        imageUpload.addEventListener('change', (e) => {
            uploadedImages = []; // Reset if they upload again
            const files = Array.from(e.target.files);
            
            files.forEach(file => {
                const reader = new FileReader();
                // When file is read, push the data URL to our array
                reader.onload = (event) => uploadedImages.push(event.target.result);
                reader.readAsDataURL(file);
            });
        });

        // 3. Start the Filter
        startBtn.addEventListener('click', () => {
            if (uploadedImages.length === 0) {
                alert("Please upload some images first!");
                return;
            }
            // Hide setup, show the game
            setupScreen.style.display = 'none';
            filterArea.style.display = 'flex';
            cycleImage();
        });

        // 4. Cycle to a random image
        function cycleImage() {
            // Optional: add a quick animation effect
            currentImage.style.transform = 'scale(0.8)';
            setTimeout(() => {
                const randomIndex = Math.floor(Math.random() * uploadedImages.length);
                currentImage.src = uploadedImages[randomIndex];
                currentImage.style.transform = 'scale(1)';
            }, 100);
        }

        // 5. Button Listeners
        btnBool.addEventListener('click', cycleImage);
        btnNobool.addEventListener('click', cycleImage);
    </script>
</body>
</html>
